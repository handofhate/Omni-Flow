body:
  - type: dropdown
    attributes:
      name: browser
      label: Browser
      defaultValue: Chrome
      description: "Browser used for history search."
      options:
        - Chrome
        - Edge
        - Brave
        - Opera
        - Vivaldi
        - Arc
        - Firefox

  - type: dropdown
    attributes:
      name: tab_mode
      label: Tab Switching Mode
      defaultValue: None
      description: "None: history search only. Extension: install companion extension for open-tab switching (Chrome recommended)."
      options:
        - None
        - Extension

  - type: textBlock
    attributes:
      name: extension_info
      description: >
        EXTENSION MODE SETUP
        1. Open Chrome and go to chrome://extensions
        2. Enable Developer mode
        3. Click Load unpacked and select the extension folder inside this plugin install directory
        4. Set Tab Switching Mode to Extension above
        5. Chrome is officially supported. It should also work on Edge, Brave, Opera, Vivaldi, and Arc (best-effort).

  - type: textBlock
    attributes:
      name: sidecar_notice
      description: >
        SAFETY NOTICE
        In Extension mode, the plugin spawns a separate persistent Python sidecar process.
        It listens on 127.0.0.1 only, accepts tab updates from the extension, and sets Access-Control-Allow-Origin: *.
        It is local-only and not remotely accessible.

  - type: input
    attributes:
      name: max_results
      label: Max Results
      defaultValue: "20"
      description: "Maximum number of history results to show."

  - type: input
    attributes:
      name: extension_port
      label: Extension Port
      defaultValue: "7323"
      description: "Port used for local tab sync in Extension mode."
