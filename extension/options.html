<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Omni Flow Tab Sync Settings</title>
  <style>
    body { font-family: sans-serif; padding: 24px; max-width: 400px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input { width: 100%; padding: 6px 8px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 8px 16px; cursor: pointer; }
    #status { margin-top: 10px; color: green; display: none; }
  </style>
</head>
<body>
  <h2>Omni Flow Tab Sync</h2>
  <p>Configure the local port to match Omni Flow plugin settings.</p>

  <label for="port">Plugin Server Port</label>
  <input type="number" id="port" min="1024" max="65535" value="7323" />

  <button id="save">Save</button>
  <div id="status">Saved.</div>

  <script src="options.js"></script>
</body>
</html>
